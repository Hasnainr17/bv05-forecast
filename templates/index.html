<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BV05 · Toronto Forecast Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 40px 32px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 32px;
      text-align: center;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #93c5fd;
      text-align: center;
    }

    .value {
      font-size: 3.6rem;
      font-weight: 700;
      color: #93c5fd;
      text-align: center;
    }

    .detail {
      font-size: 1.1rem;
      margin-top: 10px;
      text-align: center;
    }

    .load-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .mini-box {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .mini-title {
      font-size: 0.95rem;
      color: #cbd5e1;
    }

    .mini-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #93c5fd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: center;
    }

    th {
      color: #93c5fd;
    }

    .error {
      color: #fca5a5;
      text-align: center;
      margin-top: 12px;
    }

    .input-field {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      border: none;
    }

    .submit-btn {
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #60a5fa, #818cf8);
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>
<div class="wrapper">

<!-- WEATHER -->
<div class="card">
  <h1>Toronto Forecast Dashboard</h1>
  <h2>Today's Weather</h2>

  <div class="value" id="temp">-</div>
  <div class="detail">Feels like <span id="feels">-</span></div>
  <div class="detail">
    <span id="date">-</span> •
    <span id="hum">-</span>% •
    <span id="wind">-</span> km/h
  </div>
</div>

<!-- USER FORECAST -->
<div class="card">
  <h2>User Load Forecast</h2>

  <div style="text-align:center;">
    <a href="/download-template" class="submit-btn">Download Template</a>
  </div>

  <form id="user-form">
    <select name="city" class="input-field" required>
      <option value="">Select City</option>
      <option>Toronto</option>
      <option>Ottawa</option>
      <option>Hamilton</option>
      <option>London</option>
      <option>Mississauga</option>
      <option>Brampton</option>
    </select>

    <input type="file" name="input_file" class="input-field" required>

    <button class="submit-btn">Run Forecast</button>
  </form>

  <div id="user-msg" class="detail"></div>
  <div id="user-error" class="error"></div>

  <table id="user-table" style="display:none;">
    <thead id="user-head"></thead>
    <tbody id="user-body"></tbody>
  </table>
</div>

<!-- DEFAULT LOAD -->
<div class="card">
  <h2>Latest Load Forecast</h2>

  <div class="load-grid">
    <div class="mini-box">
      <div class="mini-title">Date</div>
      <div id="load-date"></div>
    </div>
    <div class="mini-box">
      <div class="mini-title">Residential</div>
      <div id="res-load"></div>
    </div>
    <div class="mini-box">
      <div class="mini-title">C&I</div>
      <div id="ci-load"></div>
    </div>
  </div>

  <table id="load-table" style="display:none;">
    <thead>
      <tr>
        <th>Date</th><th>Res</th><th>CI</th>
      </tr>
    </thead>
    <tbody id="load-body"></tbody>
  </table>
</div>

</div>

<script>

// WEATHER
fetch('/api/weather')
.then(r=>r.json())
.then(d=>{
  document.getElementById('temp').textContent = d['temperature_2m_mean (°C)'];
  document.getElementById('feels').textContent = d['apparent_temperature_mean (°C)'];
  document.getElementById('date').textContent = new Date(d.date).toLocaleDateString();
  document.getElementById('hum').textContent = d['relative_humidity_2m_mean (%)'];
  document.getElementById('wind').textContent = d['wind_speed_10m_mean (km/h)'];
});

// DEFAULT LOAD
fetch('/api/load')
.then(r=>r.json())
.then(data=>{
  const first = data[0];
  document.getElementById('load-date').textContent = first.date;
  document.getElementById('res-load').textContent = (first.forecast_residential_load/1000000).toFixed(2)+'M';
  document.getElementById('ci-load').textContent = (first.forecast_ci_load/1000000).toFixed(2)+'M';
});

// USER FORM
document.getElementById('user-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const formData = new FormData(e.target);

  document.getElementById('user-msg').textContent="Running...";
  document.getElementById('user-error').textContent="";

  try{
    const res = await fetch('/api/user-load',{method:'POST',body:formData});
    const data = await res.json();

    if(!res.ok) throw new Error(data.error);

    document.getElementById('user-msg').textContent=data.message;

    const rows=data.data;
    const keys=Object.keys(rows[0]);

    const head=document.getElementById('user-head');
    head.innerHTML='<tr>'+keys.map(k=>`<th>${k}</th>`).join('')+'</tr>';

    const body=document.getElementById('user-body');
    body.innerHTML='';

    rows.forEach(r=>{
      body.innerHTML+=`<tr>${keys.map(k=>`<td>${r[k]}</td>`).join('')}</tr>`;
    });

    document.getElementById('user-table').style.display='table';

  }catch(err){
    document.getElementById('user-error').textContent=err.message;
  }

});

</script>

</body>
</html>
